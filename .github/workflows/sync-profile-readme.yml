name: Sync Organization Profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-profile-readme.yml"
      - ".github/scripts/generate-profile-readme.mjs"

concurrency:
  group: sync-organization-profile-readme
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync-profile-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout organization profile repository
        uses: actions/checkout@v6

      - name: Checkout public website repository
        run: git clone --depth 1 https://github.com/DevRelJam/devreljam.github.io.git website

      - name: Validate website data
        run: |
          jq empty website/public/data/site.json
          jq empty website/public/data/events.json
          jq empty website/public/data/people.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Generate organization profile README
        env:
          WEBSITE_DIR: website
          PROFILE_README_PATH: profile/README.md
          PROFILE_ASSET_DIR: assets
        run: node .github/scripts/generate-profile-readme.mjs

      - name: Check for generated changes
        id: verify-changed-files
        run: |
          if git diff --quiet -- profile/README.md assets/devreljam-avocado-logo.png assets/devreljam-avocado-mark.png; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff -- profile/README.md
          fi

      - name: Commit and push organization profile README
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add profile/README.md assets/devreljam-avocado-logo.png assets/devreljam-avocado-mark.png
          git commit -m "Sync profile README from website config"
          git push
